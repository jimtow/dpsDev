<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
</head>
<h2>User Watts <input id="num1" type="number" placeholder="watts"> </h2>
  <h2>500m Split (seconds)  <input id="num2" type="number" placeholder="split"> </h2>                                                                  </h2>
  <h2>Full Effort Cadence <input id="num3" type="number" placeholder="feCadence"> </h2>                                                   </h2>
  <h2>Pull Length (m)  <input id="num4" type="number" placeholder="pullLength">  </h2>                                                             </h2>
  <h2>Percent Drive <input id="num5" type="number" placeholder="percentDrive">  </h2>                                                               </h2>
  
  <br> 

<!-- html comment: 6.11 finish formatting boxes and then add 
 buttons for calculating pull force and meters per stroke. Add a button for 
 calculating watts from split and cadence. Add comment boxes-->

  <button style="width: 200px; height: 50px;"
   onclick="calculate('+')">Go</button>
  
  <!--<button onclick="calculate('-')">-</button> -->
  <!--<button onclick="calculate('*')">*</button> -->
  <!--<button onclick="calculate('/')">/</button> -->

  <h4 id="result">Results: </h4>
  <h2 id="pullForce">Pull Force: </h2>
  <h2 id="mtrsPer">Meters per Stroke: </h2>

  
  <script>
    function calculate(operator) {
      const a = Number(document.getElementById("num1").value);
      const b = Number(document.getElementById("num2").value);
      let result;

      if (operator === "+") result = a + b;
      if (operator === "-") result = a - b;
      if (operator === "*") result = a * b;
      if (operator === "/") result = b !== 0 ? a / b : "Cannot divide by zero";

      document.getElementById("result").textContent = "Result: " + result;
    }
  </script>
</body>
</html>
